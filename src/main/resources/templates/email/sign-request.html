<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitEquity 계약서 서명 요청</title>
  <style>
    body { font-family: 'Apple SD Gothic Neo', Arial, sans-serif; background:#f5f7fa; margin:0; padding:0; }
    .container { max-width:600px; margin:40px auto; background:#fff; border-radius:12px;
                 box-shadow:0 2px 16px rgba(0,0,0,.1); overflow:hidden; }
    .header { background:linear-gradient(135deg,#24292e,#0366d6); padding:32px; text-align:center; }
    .header h1 { color:#fff; margin:0; font-size:24px; }
    .header p  { color:#c8d3dc; margin:8px 0 0; font-size:14px; }
    .body { padding:32px; }
    .body p  { color:#24292e; line-height:1.7; font-size:15px; }
    .equity-table { width:100%; border-collapse:collapse; margin:20px 0; }
    .equity-table th { background:#f6f8fa; color:#586069; font-size:13px;
                       padding:10px 14px; text-align:left; border-bottom:2px solid #e1e4e8; }
    .equity-table td { padding:12px 14px; border-bottom:1px solid #e1e4e8; font-size:14px; color:#24292e; }
    .equity-table .highlight { font-weight:700; color:#0366d6; }
    .cta { text-align:center; margin:32px 0; }
    .cta a { display:inline-block; background:#0366d6; color:#fff; padding:14px 36px;
              border-radius:6px; text-decoration:none; font-size:16px; font-weight:600; }
    .footer { background:#f6f8fa; padding:20px 32px; text-align:center;
              font-size:12px; color:#6a737d; border-top:1px solid #e1e4e8; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>⚖️ GitEquity</h1>
    <p>공정한 기여 기반 지분 계약</p>
  </div>
  <div class="body">
    <p>안녕하세요, <strong th:text="${recipientName}">홍길동</strong>님</p>
    <p>
      <strong th:text="${projectName}">프로젝트명</strong> 프로젝트의 지분 계약서가 생성되었습니다.<br>
      아래 내용을 확인하고 서명해 주세요.
    </p>

    <table class="equity-table">
      <thead>
        <tr>
          <th>멤버</th>
          <th>기여 점수</th>
          <th>지분율</th>
          <th>서명 상태</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="member : ${members}">
          <td th:text="${member.username}">username</td>
          <td th:text="${#numbers.formatDecimal(member.rawScore, 1, 2)}">0.00</td>
          <td class="highlight" th:text="${#numbers.formatDecimal(member.percentage, 1, 2) + '%'}">0.00%</td>
          <td th:text="${member.signed} ? '✅ 완료' : '⏳ 대기'">대기</td>
        </tr>
      </tbody>
    </table>

    <div class="cta">
      <a th:href="${signUrl}">계약서 서명하기</a>
    </div>

    <p style="font-size:13px;color:#6a737d;">
      이 링크는 <strong th:text="${expiresAt}">7일</strong> 후 만료됩니다.<br>
      본인이 요청하지 않은 경우 이 메일을 무시하세요.
    </p>
  </div>
  <div class="footer">
    © 2025 GitEquity · <a href="#">이용약관</a> · <a href="#">개인정보처리방침</a>
  </div>
</div>
</body>
</html>
