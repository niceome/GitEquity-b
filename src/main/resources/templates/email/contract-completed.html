<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <title>GitEquity 계약 체결 완료</title>
  <style>
    body { font-family:'Apple SD Gothic Neo',Arial,sans-serif; background:#f5f7fa; margin:0; padding:0; }
    .container { max-width:600px; margin:40px auto; background:#fff; border-radius:12px;
                 box-shadow:0 2px 16px rgba(0,0,0,.1); overflow:hidden; }
    .header { background:linear-gradient(135deg,#28a745,#0366d6); padding:32px; text-align:center; }
    .header h1 { color:#fff; margin:0; font-size:24px; }
    .header p  { color:#d4edda; margin:8px 0 0; font-size:14px; }
    .body { padding:32px; }
    .body p { color:#24292e; line-height:1.7; font-size:15px; }
    .equity-table { width:100%; border-collapse:collapse; margin:20px 0; }
    .equity-table th { background:#f6f8fa; color:#586069; font-size:13px;
                       padding:10px 14px; text-align:left; border-bottom:2px solid #e1e4e8; }
    .equity-table td { padding:12px 14px; border-bottom:1px solid #e1e4e8; font-size:14px; color:#24292e; }
    .equity-table .highlight { font-weight:700; color:#28a745; }
    .cta { text-align:center; margin:32px 0; }
    .cta a { display:inline-block; background:#28a745; color:#fff; padding:14px 36px;
              border-radius:6px; text-decoration:none; font-size:16px; font-weight:600; }
    .badge { display:inline-block; background:#d4edda; color:#155724; padding:4px 12px;
             border-radius:20px; font-size:13px; font-weight:600; }
    .footer { background:#f6f8fa; padding:20px 32px; text-align:center;
              font-size:12px; color:#6a737d; border-top:1px solid #e1e4e8; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🎉 계약 체결 완료</h1>
    <p>모든 멤버가 서명을 완료했습니다</p>
  </div>
  <div class="body">
    <p>안녕하세요, <strong th:text="${recipientName}">홍길동</strong>님<br>
       <strong th:text="${projectName}">프로젝트명</strong>의 지분 계약서가 공식 체결되었습니다.
       <span class="badge">✅ 체결 완료</span>
    </p>

    <table class="equity-table">
      <thead>
        <tr><th>멤버</th><th>지분율</th><th>서명 시각</th></tr>
      </thead>
      <tbody>
        <tr th:each="member : ${members}">
          <td th:text="${member.username}">username</td>
          <td class="highlight" th:text="${#numbers.formatDecimal(member.percentage,1,2) + '%'}">0%</td>
          <td th:text="${#temporals.format(member.signedAt,'yyyy-MM-dd HH:mm')}">-</td>
        </tr>
      </tbody>
    </table>

    <div class="cta">
      <a th:href="${pdfUrl}">계약서 PDF 다운로드</a>
    </div>
  </div>
  <div class="footer">© 2025 GitEquity</div>
</div>
</body>
</html>
