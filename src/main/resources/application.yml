spring:
  application:
    name: backend

  datasource:
    url: jdbc:postgresql://localhost:15432/gitequity
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
        implicit-strategy: org.springframework.boot.orm.jpa.hibernate.SpringImplicitNamingStrategy
    properties:
      hibernate:
        format_sql: false
    show-sql: false
    open-in-view: false

  flyway:
    enabled: false

  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope:
              - user:email
              - read:user
        provider:
          github:
            authorization-uri: https://github.com/login/oauth/authorize
            token-uri: https://github.com/login/oauth/access_token
            user-info-uri: https://api.github.com/user
            user-name-attribute: login

  # 아래의 mail과 thymeleaf를 기존 spring: 블록 안으로 이동시켰습니다.
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:gkgk@naver.com}
    password: ${MAIL_PASSWORD:kkkkk}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

# spring 블록 밖의 설정들
jwt:
  secret: ${JWT_SECRET}
  expiry: ${JWT_EXPIRY:86400000}

github:
  api:
    base-url: https://api.github.com
  webhook:
    secret: ${GITHUB_WEBHOOK_SECRET}
  collection:
    cron: "0 0 18 * * *"

app:
  oauth2:
    redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:5173/oauth/callback}
  base-url: ${APP_BASE_URL:http://localhost:8080}

logging:
  level:
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN
    org.hibernate.type.descriptor.sql: WARN
    com.zaxxer.hikari: WARN